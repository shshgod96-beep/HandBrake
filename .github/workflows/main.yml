name: Mac Android Emulator + Magisk Root via Tailscale
on: workflow_dispatch

jobs:
  run-emulator:
    runs-on: macos-13 # لازم نرجع لـ Intel Mac عشان M1 مبيدعمش Hardware Acceleration في السيرفرات
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ========================
      # 1) تجهيز Tailscale
      # ========================
      - name: Install & Start Tailscale
        run: |
          brew install tailscale
          sudo tailscaled &
          sleep 5
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          echo "=== Tailscale IP ==="
          tailscale ip -4
          echo "==================="

      # ========================
      # 2) تنزيل Android System Image (x86_64)
      # ========================
      - name: Install Android SDK Components
        run: |
          # استخدام x86_64 عشان يشتغل على معالجات Intel ويدعم الـ Hypervisor
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "system-images;android-30;google_apis;x86_64" \
            "platform-tools" \
            "emulator" \
            "platforms;android-30"

      # ========================
      # 3) إنشاء AVD
      # ========================
      - name: Create AVD
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name "rooted_android" \
            --package "system-images;android-30;google_apis;x86_64" \
            --device "Nexus 6" \
            --force

      # ========================
      # 4) تركيب Magisk عبر rootAVD
      # ========================
      - name: Install Magisk via rootAVD
        run: |
          echo "📦 بنحمّل rootAVD..."
          git clone https://gitlab.com/newbit/rootAVD.git
          cd rootAVD

          echo "🔓 بنركّب Magisk على الـ system image..."
          bash rootAVD.sh $ANDROID_HOME/system-images/android-30/google_apis/x86_64/ramdisk.img || true

          echo "✅ Magisk اتركّب على الـ image!"

      # ========================
      # 5) تشغيل المحاكي
      # ========================
      - name: Boot Emulator
        run: |
          echo "🚀 بنشغّل المحاكي (وهنسجل اللوج بتاعه عشان لو حصل مشكلة)..."
          
          # إعدادات مناسبة لـ Intel Mac
          $ANDROID_HOME/emulator/emulator -avd rooted_android \
            -no-window \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -memory 4096 \
            -cores 2 > emulator.log 2>&1 &

          echo "⏳ مستنيين المحاكي يظهر..."
          
          TRIES=0
          DEVICE_FOUND=""
          while [ "$DEVICE_FOUND" == "" ] && [ $TRIES -lt 60 ]; do
            DEVICE_FOUND=$(adb devices | grep "emulator-" || true)
            if [ "$DEVICE_FOUND" != "" ]; then
               break
            fi
            TRIES=$((TRIES + 1))
            sleep 2
          done

          if [ "$DEVICE_FOUND" == "" ]; then
             echo "❌ المحاكي مظهرش أساساً! دي تفاصيل الخطأ:"
             cat emulator.log
             exit 1
          fi

          echo "✅ المحاكي ظهر في ADB! مستنيينه يخلص فتح نظام الأندرويد..."

          BOOT_COMPLETE=""
          TRIES=0
          while [ "$BOOT_COMPLETE" != "1" ] && [ $TRIES -lt 150 ]; do
            BOOT_COMPLETE=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            TRIES=$((TRIES + 1))
            sleep 2
          done

          if [ "$BOOT_COMPLETE" != "1" ]; then
            echo "❌ المحاكي فتح بس نظام الأندرويد مهنج! دي تفاصيل الخطأ:"
            cat emulator.log
            exit 1
          fi

          echo "✅ المحاكي فتح بالكامل بنجاح!"

      # ========================
      # 6) التأكد من Magisk و Root
      # ========================
      - name: Verify Magisk Root
        run: |
          echo "🔍 بنتأكد من الـ Root..."
          sleep 10
          adb shell "which su" || true
          adb shell "magisk -v" 2>/dev/null || true
          echo "✅ Root verification done!"

      # ========================
      # 7) تركيب Magisk Manager APK
      # ========================
      - name: Install Magisk Manager App
        run: |
          echo "📱 بنركّب تطبيق Magisk Manager..."
          MAGISK_URL=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | grep "browser_download_url.*\.apk" \
            | head -1 \
            | cut -d '"' -f 4)

          if [ -n "$MAGISK_URL" ]; then
            curl -L -o Magisk.apk "$MAGISK_URL"
            adb install Magisk.apk
            echo "✅ Magisk Manager اتركّب!"
          else
            echo "⚠️ مقدرناش ننزّل Magisk APK"
          fi

      # ========================
      # 8) فتح ADB على الشبكة
      # ========================
      - name: Setup Network Access
        run: |
          adb tcpip 5555
          TAILSCALE_IP=$(tailscale ip -4)
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  🎉 المحاكي شغال بـ MAGISK ROOT!            ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  📡 ADB Connect:                             ║"
          echo "║  adb connect ${TAILSCALE_IP}:5555            ║"
          echo "║                                              ║"
          echo "║  📱 scrcpy:                                  ║"
          echo "║  scrcpy --tcpip=${TAILSCALE_IP}:5555         ║"
          echo "╚══════════════════════════════════════════════╝"

      # ========================
      # 9) خلّي المحاكي شغال
      # ========================
      - name: Keep Alive (6 Hours)
        run: |
          echo "⏰ المحاكي هيفضل شغال 6 ساعات..."
          sleep 21600
